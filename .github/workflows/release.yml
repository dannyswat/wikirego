name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v2.1.3, etc.

jobs:
  build-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Upload client dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: build/public

  build-release:
    needs: build-client
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: wikirego-linux-amd64
          - goos: linux
            goarch: arm64
            archive: wikirego-linux-arm64
          - goos: darwin
            goarch: amd64
            archive: wikirego-darwin-amd64
          - goos: darwin
            goarch: arm64
            archive: wikirego-darwin-arm64
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: wikirego-windows-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.sum

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: build/public

      - name: Build server binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd server
          go build -ldflags="-s -w" -o ../build/wikirego${{ matrix.ext }} ./cmd/web/main.go

      - name: Assemble package
        run: |
          mkdir -p package/public \
                   package/views \
                   package/data \
                   package/media/uploads \
                   package/media/diagrams \
                   package/media/uml \
                   package/media/umlsource \
                   package/media/dgsource \
                   package/conf
          mv build/wikirego${{ matrix.ext }} package/
          cp -r build/public/. package/public/
          cp server/views/*.html package/views/
          cp server/conf/fido2.json package/conf/
          cp release/web.config package/

      - name: Create ZIP
        run: |
          cd package
          zip -r ../${{ matrix.archive }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}.zip

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wikirego-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
